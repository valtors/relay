name: Feature request
description: Suggest a small improvement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      placeholder: I want Relay to...
    validations:
      required: true
  - type: textarea
    id: simple
    attributes:
      label: What is the smallest useful version of this?
      placeholder: The first good version could...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else we should know?
      placeholder: Links, screenshots, similar tools, rough API shape
  - type: dropdown
    id: contributing
    attributes:
      label: Do you want to work on this?
      options:
        - "Yes"
        - "Maybe"
        - "No"
