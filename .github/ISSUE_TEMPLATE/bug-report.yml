name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Relay version
      placeholder: v0.3.0
  - type: input
    id: editor
    attributes:
      label: Editor / MCP client
      placeholder: Claude Code, Cursor, VS Code Copilot, etc.
