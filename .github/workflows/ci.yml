name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt issues:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1.0
          working-directory: .

      - name: go test
        run: go test -count=1 -race -coverprofile=coverage.out ./...

      - name: coverage check
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $NF}' | tr -d '%')
          echo "Coverage: ${total}%"
          threshold=60
          if (( $(echo "$total < $threshold" | bc -l) )); then
            echo "Coverage ${total}% below threshold ${threshold}%"
            exit 1
          fi
