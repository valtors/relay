---
run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - errorlint
    - gocritic
    - nilnil
    - bodyclose

linters-settings:
  gocritic:
    disabled-tags:
      - performance
  revive:
    rules:
      - name: exported
        disabled: true
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
  max-issues-per-linter: 0
  max-same-issues: 0
