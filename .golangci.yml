version: "2"
run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - errorlint
    - gocritic
    - bodyclose

  settings:
    gocritic:
      disabled-tags:
        - performance
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocritic

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
